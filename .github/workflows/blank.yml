name: Train and Evaluate

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: "Number of epochs"
        required: true
        default: "10"

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Clone WMI repository
        run: |
          git clone https://oauth2:${{ secrets.WMI_TOKEN }}@git.wmi.amu.edu.pl/s481839/InzynieriaUczeniaMaszynowego.git repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            pandas \
            scikit-learn \
            numpy \
            joblib \
            mlflow==2.12.1

          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Show repository structure
        run: |
          ls
          ls repo
          find repo -maxdepth 3 -type f

      - name: Clean old MLflow runs
        working-directory: repo
        run: |
          rm -rf mlruns
          rm -f mlflow_registry.db

      - name: Train model
        working-directory: repo
        run: |
          python uv-inzynieria/src/torchtrain.py
        env:
          MLFLOW_TRACKING_URI: file:./mlruns

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: |
            repo/mlruns/
            repo/mlflow_registry.db
          retention-days: 7


  evaluate:
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Clone WMI repository
        run: |
          git clone https://oauth2:${{ secrets.WMI_TOKEN }}@git.wmi.amu.edu.pl/s481839/InzynieriaUczeniaMaszynowego.git repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            pandas \
            scikit-learn \
            numpy \
            joblib \
            mlflow==2.12.1

          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-artifacts
          path: repo/

      - name: Evaluate model
        working-directory: repo
        run: |
          python uv-inzynieria/src/torchpredict.py
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
